<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Snake</h1>
      <p class="status">Score: <span id="score">0</span></p>
      <p id="message" class="message" aria-live="polite"></p>

      <div id="board" class="board" role="grid" aria-label="Snake game board"></div>

      <div class="controls" aria-label="On-screen controls">
        <button type="button" data-dir="up">Up</button>
        <div class="controls-row">
          <button type="button" data-dir="left">Left</button>
          <button type="button" id="restart">Restart</button>
          <button type="button" data-dir="right">Right</button>
        </div>
        <button type="button" data-dir="down">Down</button>
        <button type="button" id="pause">Pause</button>
      </div>

      <p class="hint">Use Arrow keys or WASD. Press P to pause/resume. Press Space to restart after game over.</p>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
